<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TalentMatch</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="navbar"></div>

<div class="auth-page">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-form">
        <h1 class="auth-title">Login to your Account</h1>
        <p class="auth-sub">Welcome back! Select the below login methods.</p>
        <div id="loginAlert"></div>

        <div class="form-group">
          <label>Email ID / Username</label>
          <input type="email" id="loginEmail" placeholder="Enter email id / username" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="pass-wrap">
            <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password">
            <button class="pass-toggle" type="button" onclick="togglePass('loginPass',this)">Show</button>
          </div>
          <div class="forgot-row" style="margin-top:8px">
            <label class="checkbox-row">
              <input type="checkbox"> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>
        </div>

        <button class="btn btn-primary btn-full btn-lg" onclick="doLogin()">Login</button>

        <div class="or-divider">or login with</div>
        <div class="social-btns">
          <button class="social-btn" title="Google" onclick="socialLogin()">G</button>
          <button class="social-btn" title="Facebook" onclick="socialLogin()">f</button>
          <button class="social-btn" title="LinkedIn" onclick="socialLogin()">in</button>
        </div>
        <p class="auth-switch">Don't have an account? <a href="register.html">Register</a></p>
      </div>

      <!-- Illustration -->
      <div class="auth-illustration">
        <svg viewBox="0 0 200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Person -->
          <rect x="60" y="160" width="80" height="90" rx="8" fill="#e0e7ff"/>
          <circle cx="100" cy="120" r="36" fill="#c7d2fe"/>
          <circle cx="100" cy="110" r="22" fill="#4A6CF7" opacity=".8"/>
          <path d="M65 162c0-19 16-35 35-35s35 16 35 35" fill="#4A6CF7" opacity=".8"/>
          <!-- Magnifier -->
          <circle cx="130" cy="145" r="28" stroke="#4A6CF7" stroke-width="4" fill="none" opacity=".5"/>
          <line x1="150" y1="165" x2="170" y2="185" stroke="#4A6CF7" stroke-width="5" stroke-linecap="round"/>
          <!-- Doc lines -->
          <rect x="10" y="80" width="65" height="80" rx="6" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.5"/>
          <line x1="22" y1="100" x2="62" y2="100" stroke="#a5b4fc" stroke-width="2"/>
          <line x1="22" y1="114" x2="55" y2="114" stroke="#a5b4fc" stroke-width="2"/>
          <line x1="22" y1="128" x2="58" y2="128" stroke="#a5b4fc" stroke-width="2"/>
          <circle cx="32" cy="90" r="8" fill="#c7d2fe"/>
          <!-- Doc 2 -->
          <rect x="125" y="30" width="65" height="80" rx="6" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.5"/>
          <line x1="137" y1="50" x2="177" y2="50" stroke="#a5b4fc" stroke-width="2"/>
          <line x1="137" y1="64" x2="170" y2="64" stroke="#a5b4fc" stroke-width="2"/>
          <line x1="137" y1="78" x2="173" y2="78" stroke="#a5b4fc" stroke-width="2"/>
          <circle cx="147" cy="40" r="8" fill="#c7d2fe"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<script src="js/data.js?v=4"></script>
<script src="js/auth.js?v=4"></script>
<script>
  DB.init();
  renderNavbar('');

  // Redirect if already logged in
  if (Auth.getCurrentUser()) window.location.href = 'index.html';

  function togglePass(id, btn) {
    const el = document.getElementById(id);
    const hidden = el.type === 'password';
    el.type = hidden ? 'text' : 'password';
    btn.textContent = hidden ? 'Hide' : 'Show';
  }

  function showAlert(msg, type = 'err') {
    document.getElementById('loginAlert').innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
  }

  function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    if (!email || !pass) { showAlert('Please fill in all fields.'); return; }
    const res = Auth.login(email, pass);
    if (!res.ok) { showAlert(res.error); return; }
    const user = res.user;
    window.location.href = user.type === 'employer' ? 'employers.html' : 'index.html';
  }

  function socialLogin() {
    alert('Social login is not available in demo mode.\n\nUse demo accounts:\n• Candidate: alice@example.com / password123\n• Employer: hr@google.example.com / password123');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
